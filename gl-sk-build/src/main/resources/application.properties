## Basic app
server.port=8083
spring.application.name=gl-sk-build

## Runtime boundary
geelato.web.platform.design-time.enabled=false

## Scaffold base: primary datasource
spring.datasource.primary.name=primary
spring.datasource.primary.jdbc-url=${GEELATO_PRIMARY_JDBCURL:jdbc:mysql://localhost:3306/gl_sk_build?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowMultiQueries=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
spring.datasource.primary.username=${GEELATO_PRIMARY_JDBCUSER:geelato_user}
spring.datasource.primary.password=${GEELATO_PRIMARY_JDBCPASSWORD:geelato@psd}
spring.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver

## Scaffold base: ORM and dynamic datasource
geelato.orm.dao-bean-name=dynamicDao
geelato.datasource.dynamic.enable-jta-transaction=false
geelato.datasource.dynamic.enable-seata-proxy=false

## Scaffold runtime paths
geelato.upload.root-directory=/upload
geelato.upload.convert-directory=/upload/convert
geelato.upload.config-directory=/upload/config

## Scaffold capabilities
geelato.app.scaffold.enabled=true
geelato.app.scaffold.auto-init-tables=true
geelato.app.scaffold.strict=true
geelato.app.scaffold.capabilities=login,mql,organization,user,dictionary,upload

## OpenAPI JSON
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
geelato.app.scaffold.openapi-enabled=true
geelato.app.scaffold.openapi-expose-in-prod=false

## MQL & GraalVM native scan packages (must include business package)
geelato.meta.scan-package-names=cn.geelato,cn.geelato.app.glskbuild
geelato.graal.scan-package-names=cn.geelato,cn.geelato.app.glskbuild

## Logging
logging.level.root=INFO
logging.level.cn.geelato=INFO
